<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Penta Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <link rel="shortcut icon" href="./logo1.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            display: none; 
        }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; transition: all 0.2s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .social-btn { background: #1e293b; border: 1px solid #334155; transition: all 0.2s; cursor: pointer; }
        .social-btn:hover { background: #334155; border-color: #38bdf8; }

        .tab-btn { padding: 10px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid transparent; color: #64748b; transition: all 0.3s; }
        .tab-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }

        #loadingOverlay { 
            background: #020617; display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            align-items: center; justify-content: center; z-index: 100; 
        }

        .divider { display: flex; align-items: center; text-align: center; color: #64748b; font-size: 0.75rem; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #1e293b; }
        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        .spinner { width: 40px; height: 40px; border: 4px solid rgba(56, 189, 248, 0.1); border-left-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loadingOverlay">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p id="loadingStatus" class="text-sm font-bold neon-blue tracking-widest uppercase">Sincronizando...</p>
        </div>
    </div>

    <div id="authSection" class="card w-full max-w-md rounded-2xl p-8 shadow-2xl hidden">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black mb-2"><span class="neon-blue">Penta Elite</span></h1>
        </div>

        <button id="googleBtn" type="button" class="social-btn w-full flex items-center justify-center gap-3 py-4 rounded-xl text-sm font-bold mb-6">
            <i data-lucide="chrome" class="w-5 h-5 text-red-400"></i>
            Acceder con Google
        </button>

        <div class="divider uppercase font-black">Identificación Manual</div>

        <div class="flex w-full mb-6 border-b border-slate-800">
            <button onclick="switchTab('login')" id="tab-login" class="tab-btn flex-1 active">Iniciar Sesión</button>
            <button onclick="switchTab('register')" id="tab-register" class="tab-btn flex-1">Registrarse</button>
        </div>

        <form id="authForm" class="space-y-4">
            <input type="email" id="email" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="Email del Agente">
            <input type="password" id="password" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="Contraseña">
            
            <button type="submit" id="submitBtn" class="btn-primary w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest mt-4">
                Entrar al Sistema
            </button>
        </form>
    </div>

   <script type="module">
    // Importaciones necesarias de Firebase con persistencia
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithPopup, 
        GoogleAuthProvider, 
        onAuthStateChanged, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword,
        setPersistence,
        browserLocalPersistence 
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    // Importamos Firestore para activar el caché desde el inicio
    import { getFirestore, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ",
        authDomain: "pentatlon-scores.firebaseapp.com",
        projectId: "pentatlon-scores",
        storageBucket: "pentatlon-scores.firebasestorage.app",
        messagingSenderId: "650229123946",
        appId: "1:650229123946:web:a3769c31f8ce1a23edb313"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. Configurar persistencia de sesión (Para abrir la app sin login cada vez)
    setPersistence(auth, browserLocalPersistence);

    // 2. Activar caché de datos para modo offline
    enableIndexedDbPersistence(db).catch((err) => {
        console.warn("Caché offline no disponible:", err.code);
    });
    
    const loader = document.getElementById('loadingOverlay');
    const authSection = document.getElementById('authSection');
    let currentMode = 'login';

    lucide.createIcons();

    // Cambiar entre Login y Registro
    window.switchTab = (mode) => {
        currentMode = mode;
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('tab-register').classList.toggle('active', mode === 'register');
        document.getElementById('submitBtn').innerText = mode === 'login' ? 'Entrar al Sistema' : 'Crear Nueva Cuenta';
    };

    // Escuchar estado de autenticación para redirección
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = "Penta.html"; 
        } else {
            document.body.style.display = "flex";
            authSection.classList.remove('hidden');
        }
    });

    // Login con Google
    document.getElementById('googleBtn').onclick = async () => {
        const provider = new GoogleAuthProvider();
        loader.style.display = 'flex';
        try { 
            await signInWithPopup(auth, provider);
        } catch (e) { 
            if (e.code !== 'auth/cancelled-popup-request') alert("Error: " + e.message); 
        } finally { 
            loader.style.display = 'none'; 
        }
    };

    // Formulario Manual (Login/Registro)
    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        loader.style.display = 'flex';
        
        try {
            if (currentMode === 'login') {
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
            }
        } catch (error) {
            alert("Error de autenticación: " + error.message);
        } finally {
            loader.style.display = 'none';
        }
    };
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado', reg))
        .catch(err => console.log('Error al registrar SW', err));
    });
  }
</script>
</body>
</html>
