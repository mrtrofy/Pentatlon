<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | CyberGate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .social-btn {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        .social-btn:hover {
            background: #334155;
            border-color: #38bdf8;
        }

        #loadingOverlay { 
            background: #020617; 
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
        }

        .cat-tag { 
            font-size: 0.65rem; 
            background: #1e293b; 
            color: #38bdf8; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: 700; 
            border: 1px solid #334155; 
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #1e293b;
        }
        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loadingOverlay">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p id="loadingStatus" class="text-sm font-bold neon-blue tracking-widest uppercase">Verificando...</p>
        </div>
    </div>

    <div class="card w-full max-w-md rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-block mb-3">
                <span class="cat-tag uppercase tracking-tighter">Acceso Alpha</span>
            </div>
            <h1 class="text-3xl font-black mb-2">Cyber<span class="neon-blue">Gate</span></h1>
            <p class="text-slate-400 text-sm">Inicia tu viaje en la red</p>
        </div>

        <div class="mb-6">
            <button id="googleBtn" class="social-btn w-full flex items-center justify-center gap-3 py-4 rounded-xl text-sm font-bold">
                <i data-lucide="chrome" class="w-5 h-5 text-red-400"></i>
                Continuar con Google
            </button>
        </div>

        <div class="divider uppercase font-black">o registro manual</div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Email</label>
                <input type="email" id="email" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="usuario@red.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Contraseña</label>
                <input type="password" id="password" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-900/20 mt-4">
                Crear Cuenta
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-slate-500">
            ¿Ya eres miembro? <a href="index.html" class="text-white font-bold hover:text-blue-400 transition-colors">Entrar</a>
        </p>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.min.js";
    import { 
        getAuth, 
        signInWithPopup, 
        GoogleAuthProvider, 
        createUserWithEmailAndPassword,
        sendEmailVerification,
        setPersistence,
        browserLocalPersistence 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.min.js";
    // Importamos Firestore para activar la persistencia de datos desde el inicio
    import { getFirestore, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.min.js";

    // CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ",
        authDomain: "pentatlon-scores.firebaseapp.com",
        projectId: "pentatlon-scores",
        storageBucket: "pentatlon-scores.firebasestorage.app",
        messagingSenderId: "650229123946",
        appId: "1:650229123946:web:a3769c31f8ce1a23edb313"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // Inicializamos DB

    // 1. ACTIVAR PERSISTENCIA DE SESIÓN (Auth)
    // Esto hace que el login "sobreviva" aunque cierres la app o no haya internet
    setPersistence(auth, browserLocalPersistence);

    // 2. ACTIVAR PERSISTENCIA DE DATOS (Firestore)
    enableIndexedDbPersistence(db).catch((err) => {
        console.warn("Persistencia offline no disponible:", err.code);
    });

    const loader = document.getElementById('loadingOverlay');
    const loadingStatus = document.getElementById('loadingStatus');

    lucide.createIcons();

    // Google Auth Logic
    document.getElementById('googleBtn').addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        loadingStatus.innerText = "Sincronizando Google...";
        loader.style.display = 'flex';
        try {
            await signInWithPopup(auth, provider);
            // Redirigir a la vista principal
            window.location.href = "Penta.html"; 
        } catch (error) {
            console.error(error);
            alert("Error de autenticación: " + error.message);
        } finally {
            loader.style.display = 'none';
        }
    });

    // Email Register Logic
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        loadingStatus.innerText = "Creando identidad...";
        loader.style.display = 'flex';
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await sendEmailVerification(userCredential.user);
            alert("Enlace de verificación enviado. Revisa tu bandeja de entrada.");
            window.location.href = "Penta.html";
        } catch (error) {
            console.error(error);
            alert("Error en registro: " + error.message);
        } finally {
            loader.style.display = 'none';
        }
    });
</script>
</body>
</html>
